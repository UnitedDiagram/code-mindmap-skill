<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Agent - Interactive Codebase Mind Map</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #f0c040;
  --accent2: #58a6ff;
  --accent3: #7ee787;
  --accent4: #d2a8ff;
  --accent5: #ff7b72;
  --accent6: #79c0ff;
  --code-bg: #0d1117;
  --node-agent: #f0c040;
  --node-cli: #58a6ff;
  --node-gateway: #7ee787;
  --node-tui: #d2a8ff;
  --node-tools: #ff7b72;
  --node-plugins: #79c0ff;
  --node-skills: #ffa657;
  --node-cron: #f778ba;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
}

/* Header */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex; align-items: center; gap: 16px;
}
.header h1 { font-size: 18px; color: var(--accent); font-weight: 600; }
.header .subtitle { font-size: 13px; color: var(--text-dim); }
.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  margin-left: auto; font-size: 13px; color: var(--text-dim);
}
.breadcrumb span { cursor: pointer; }
.breadcrumb span:hover { color: var(--accent2); }
.breadcrumb .sep { color: var(--border); }
.breadcrumb .current { color: var(--text); font-weight: 500; }
.zoom-controls {
  display: flex; gap: 4px; margin-left: 16px;
}
.zoom-controls button {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 4px 10px; cursor: pointer;
  border-radius: 4px; font-size: 14px;
}
.zoom-controls button:hover { background: var(--border); }

/* Main layout */
.main {
  display: flex;
  height: 100vh;
  padding-top: 52px;
}

/* Canvas area */
.canvas {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.canvas-inner {
  position: absolute;
  transform-origin: 0 0;
  transition: transform 0.3s ease;
}

/* Node grid */
.node-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  padding: 40px;
  max-width: 1400px;
}

/* Node cards */
.node-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
  min-width: 280px;
  max-width: 400px;
  flex: 1 1 300px;
}
.node-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--node-color, var(--accent));
}
.node-card:hover {
  border-color: var(--node-color, var(--accent));
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.node-card.expanded {
  flex: 1 1 100%;
  max-width: 100%;
  cursor: default;
}
.node-card .node-icon { font-size: 28px; margin-bottom: 8px; }
.node-card h3 {
  font-size: 16px; font-weight: 600;
  color: var(--node-color, var(--accent));
  margin-bottom: 6px;
}
.node-card .node-desc {
  font-size: 13px; color: var(--text-dim);
  line-height: 1.5; margin-bottom: 12px;
}
.node-card .node-files {
  font-size: 12px; color: var(--text-dim);
  display: flex; flex-wrap: wrap; gap: 4px;
}
.node-card .file-tag {
  background: var(--surface2);
  padding: 2px 8px; border-radius: 4px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 11px;
}
.node-card .click-hint {
  position: absolute; bottom: 12px; right: 16px;
  font-size: 11px; color: var(--text-dim);
  opacity: 0; transition: opacity 0.2s;
}
.node-card:hover .click-hint { opacity: 1; }

/* Connection lines (SVG) */
.connections-svg {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.conn-line {
  stroke: var(--border);
  stroke-width: 1.5;
  fill: none;
  opacity: 0.5;
}

/* Detail panel */
.detail-panel {
  width: 0;
  overflow: hidden;
  transition: width 0.3s ease;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.detail-panel.open { width: 520px; }
.detail-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.detail-header h2 {
  font-size: 16px; font-weight: 600; flex: 1;
}
.detail-close {
  background: none; border: none; color: var(--text-dim);
  font-size: 20px; cursor: pointer; padding: 4px 8px;
}
.detail-close:hover { color: var(--text); }
.detail-body {
  flex: 1; overflow-y: auto; padding: 20px;
}
.detail-section { margin-bottom: 24px; }
.detail-section h4 {
  font-size: 13px; font-weight: 600;
  color: var(--accent2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.detail-section p {
  font-size: 14px; line-height: 1.6;
  color: var(--text-dim);
}
.detail-section .explanation {
  background: var(--surface2);
  border-left: 3px solid var(--accent);
  padding: 12px 16px; border-radius: 0 8px 8px 0;
  margin-bottom: 12px; font-size: 14px; line-height: 1.6;
}

/* Code blocks */
pre.code-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 12px;
  line-height: 1.6;
  overflow-x: auto;
  color: var(--text);
  margin: 8px 0;
  white-space: pre;
}
pre.code-block .kw { color: var(--accent5); }
pre.code-block .fn { color: var(--accent4); }
pre.code-block .str { color: var(--accent3); }
pre.code-block .cm { color: var(--text-dim); font-style: italic; }
pre.code-block .type { color: var(--accent6); }

/* Sub-nodes list */
.sub-nodes { display: flex; flex-direction: column; gap: 8px; }
.sub-node {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.sub-node:hover {
  border-color: var(--accent2);
  background: #1a2332;
}
.sub-node h5 {
  font-size: 13px; font-weight: 600; color: var(--text);
  margin-bottom: 4px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.sub-node p { font-size: 12px; color: var(--text-dim); }

/* Connection badges */
.conn-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--surface2);
  padding: 3px 10px; border-radius: 12px;
  font-size: 11px; color: var(--text-dim);
  margin: 2px;
}
.conn-badge .arrow { color: var(--accent3); }

/* Back button */
.back-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--accent2);
  padding: 8px 16px; border-radius: 8px;
  cursor: pointer; font-size: 13px;
  margin-bottom: 20px;
  display: inline-flex; align-items: center; gap: 6px;
}
.back-btn:hover { background: var(--border); }

/* Legend */
.legend {
  position: fixed; bottom: 16px; left: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 11px;
  z-index: 50;
  display: flex; flex-wrap: wrap; gap: 10px;
}
.legend-item {
  display: flex; align-items: center; gap: 6px;
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb {
  background: var(--border); border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* Search */
.search-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  color: var(--text);
  font-size: 13px;
  width: 200px;
  outline: none;
}
.search-box:focus { border-color: var(--accent2); }
.search-box::placeholder { color: var(--text-dim); }
</style>
</head>
<body>

<div class="header">
  <h1>Hermes Agent</h1>
  <span class="subtitle">Interactive Codebase Mind Map</span>
  <input class="search-box" type="text" placeholder="Search modules..." id="searchBox" oninput="filterNodes(this.value)">
  <div class="breadcrumb" id="breadcrumb">
    <span class="current" onclick="goToLevel('top')">Overview</span>
  </div>
  <div class="zoom-controls">
    <button onclick="zoomIn()" title="Zoom in">+</button>
    <button onclick="zoomOut()" title="Zoom out">-</button>
    <button onclick="resetZoom()" title="Reset">1:1</button>
  </div>
</div>

<div class="main">
  <div class="canvas" id="canvas">
    <div class="canvas-inner" id="canvasInner">
      <div class="node-grid" id="nodeGrid"></div>
    </div>
  </div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h2 id="detailTitle">Details</h2>
      <button class="detail-close" onclick="closeDetail()">&times;</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--node-agent)"></div> Agent Core</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--node-cli)"></div> CLI</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--node-gateway)"></div> Gateway</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--node-tui)"></div> TUI</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--node-tools)"></div> Tools</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--node-plugins)"></div> Plugins</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--node-skills)"></div> Skills</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--node-cron)"></div> Cron</div>
</div>

<script>
// ============================================================
// CODEBASE DATA - All architecture info for the mind map
// ============================================================

const DATA = {
  systems: [
    {
      id: "agent-core",
      name: "Agent Core",
      icon: "🧠",
      color: "var(--node-agent)",
      desc: "The AI brain. Receives messages, decides when to use tools, calls the AI model, and manages the conversation. This is the central loop that makes Hermes \"think.\"",
      files: ["run_agent.py", "model_tools.py", "toolsets.py", "hermes_state.py", "hermes_constants.py"],
      connections: ["tools", "plugins", "cli", "gateway", "tui"],
      modules: [
        {
          id: "run-agent",
          name: "run_agent.py",
          subtitle: "AIAgent class (~12k lines)",
          desc: "The main \"person\" of the system. AIAgent is the entity that has a conversation with you — it receives your messages, decides when to use tools, calls the AI model for responses, handles errors, and manages the conversation state.",
          explanation: "Think of this as the brain of Hermes. When you send a message, it goes here first. The AIAgent decides: should I respond directly, or should I use a tool (like running a terminal command or searching the web) to help answer? It keeps going in a loop — calling the AI model, executing tools, calling the model again — until it has a final answer for you.",
          code: `class AIAgent:
    def run_conversation(self, user_message, ...):
        messages = build_context(user_message)
        api_call_count = 0

        while api_call_count < self.max_iterations:
            if self._interrupt_requested:
                break
            response = call_ai_model(messages, tools)
            if response.tool_calls:
                for tool in response.tool_calls:
                    result = handle_function_call(tool)
                    messages.append(result)
                api_call_count += 1
            else:
                return response.content  # Final answer`,
          connections: {imports: ["model_tools.py", "hermes_state.py", "hermes_constants.py", "agent/*"], importedBy: ["cli.py", "gateway/run.py", "tui_gateway/server.py", "cron/scheduler.py"]},
          submodules: [
            {name: "agent/conversation_loop.py", desc: "The actual run_conversation body (~3,900 lines). Model call → tool dispatch → retry → compress loop."},
            {name: "agent/agent_init.py", desc: "The 1,400-line __init__ body. Provider detection, credential resolution, context-engine bootstrap."},
            {name: "agent/context_compressor.py", desc: "Summarizes old conversation turns when the context window fills up. Uses a cheaper model to compress."},
            {name: "agent/prompt_caching.py", desc: "Places cache markers on messages so repeated API calls reuse cached context (~75% cost reduction)."},
            {name: "agent/prompt_builder.py", desc: "Assembles the system prompt from identity, skills, context files, and environment hints."},
            {name: "agent/memory_manager.py", desc: "Orchestrates memory providers. Only one external provider runs at a time. Handles background prefetch/sync."},
            {name: "agent/display.py", desc: "CLI presentation: the animated spinner faces, diff formatting, tool progress display."},
            {name: "agent/tool_guardrails.py", desc: "Detects and halts non-progressing tool call loops (same args, repeated failures)."},
            {name: "agent/error_classifier.py", desc: "Classifies API errors (rate limit, auth failure, context overflow) to decide whether to retry or fall back."},
            {name: "agent/iteration_budget.py", desc: "Tracks and enforces iteration limits with grace calls for budget exhaustion."}
          ]
        },
        {
          id: "model-tools",
          name: "model_tools.py",
          subtitle: "Tool orchestration",
          desc: "The traffic controller between the agent brain and the tools. Triggers tool discovery, provides tool schemas to the AI model, and dispatches tool calls to the right handler.",
          explanation: "When the AI model says \"I want to run a terminal command,\" this file figures out which tool handler to call, runs any plugin hooks before/after, and returns the result. It also builds the list of available tools that gets sent with every API call.",
          code: `def handle_function_call(function_name, function_args, ...):
    # Coerce arguments to match expected types
    function_args = coerce_tool_args(function_name, function_args)

    # Run plugin pre-hooks (can block execution)
    plugin_manager.run_hook("pre_tool_call", name, args)

    # Dispatch to the registered handler
    result = registry.dispatch(function_name, function_args)

    # Run plugin post-hooks
    plugin_manager.run_hook("post_tool_call", name, result)
    return result`,
          connections: {imports: ["tools/registry.py", "toolsets.py"], importedBy: ["run_agent.py"]}
        },
        {
          id: "toolsets",
          name: "toolsets.py",
          subtitle: "Tool grouping system",
          desc: "Organizes individual tools into named bundles. Instead of enabling 40 tools one by one, you enable a \"toolset\" like \"browser\" or \"terminal\" and get the right collection.",
          explanation: "Think of toolsets like a TV channel package. The \"browser\" package gives you navigate, click, screenshot. The \"terminal\" package gives you shell commands and process management. The core bundle (_HERMES_CORE_TOOLS) has ~45 tools that every platform gets.",
          code: `_HERMES_CORE_TOOLS = [
    "web_search", "web_extract",
    "terminal", "process",
    "read_file", "write_file", "patch", "search_files",
    "vision_analyze", "image_generate",
    "browser_navigate", "browser_snapshot", "browser_click",
    "todo", "memory",
    "execute_code", "delegate_task",
    "cronjob",
    # ... ~45 tools total
]`,
          connections: {imports: [], importedBy: ["model_tools.py"]}
        },
        {
          id: "hermes-state",
          name: "hermes_state.py",
          subtitle: "Session persistence (SQLite)",
          desc: "The agent's conversation memory bank. Every chat session (who said what, when, with which model) is saved in a SQLite database with full-text search.",
          explanation: "Every time you have a conversation with Hermes, it gets saved here. You can search across all past conversations, resume old sessions, and branch conversations. It uses SQLite with WAL mode for concurrent access.",
          code: `class SessionDB:
    \"\"\"SQLite-backed session storage with FTS5 search.\"\"\"

    def __init__(self, db_path=None, read_only=False):
        self.conn = sqlite3.connect(db_path or DEFAULT_DB_PATH)
        apply_wal_with_fallback(self.conn)
        self._init_schema()  # Schema version 16

    def search(self, query):
        \"\"\"FTS5-powered full-text search across all sessions.\"\"\"
        ...

DEFAULT_DB_PATH = get_hermes_home() / "state.db"`,
          connections: {imports: ["hermes_constants.py"], importedBy: ["run_agent.py", "cli.py", "gateway/run.py"]}
        },
        {
          id: "hermes-constants",
          name: "hermes_constants.py",
          subtitle: "Path resolution (the foundation)",
          desc: "The address book of the entire project. Every module asks it \"where does Hermes store its files?\" It has zero dependencies, so it can be safely imported from anywhere.",
          explanation: "Hermes supports multiple profiles (like browser profiles). This file makes sure every module uses the RIGHT directory for the active profile, rather than hardcoding ~/.hermes. It's the foundation everything else builds on.",

    \"\"\"Single source of truth for the Hermes data directory.\"\"\"

        }
      ]
    },
    {
      id: "cli",
      name: "CLI Interface",
      icon: "💻",
      color: "var(--node-cli)",
      desc: "The terminal app users interact with directly. Draws a command prompt, handles slash commands, and sends messages to the AI agent. The \"front desk\" of Hermes.",
      files: ["cli.py", "hermes_cli/commands.py", "hermes_cli/config.py"],
      connections: ["agent-core", "plugins", "gateway"],
      modules: [
        {
          id: "cli-main",
          name: "cli.py",
          subtitle: "HermesCLI class (~11k lines)",
          desc: "The main terminal application. It draws a command prompt, accepts typed input, routes slash commands to handlers, and sends regular messages to the AI agent.",
          explanation: "When you type 'hermes' in your terminal, this is what runs. It uses Rich for colorful output and prompt_toolkit for the input line with autocomplete. Slash commands like /help, /model, /new go through process_command(). Regular messages go to AIAgent.run_conversation().",
          code: `class HermesCLI(CLIAgentSetupMixin, CLICommandsMixin):
    def process_command(self, command):

        _base_word = cmd_lower.split()[0].lstrip("/")
        _cmd_def = resolve_command(_base_word)
        canonical = _cmd_def.name if _cmd_def else _base_word

        if canonical in {"quit", "exit"}:

        elif canonical == "help":

          connections: {imports: ["hermes_cli/commands.py", "hermes_cli/config.py", "hermes_constants.py", "run_agent.py"], importedBy: []}
        },
        {
          id: "commands",
          name: "hermes_cli/commands.py",
          subtitle: "Slash command registry",
          desc: "The master phone directory of every slash command Hermes understands. Every command has a name, description, category, and optional aliases. All other parts of the system look up commands here.",
          explanation: "This is the single source of truth for commands. Add a CommandDef here, and it automatically appears in CLI help, gateway dispatch, Telegram bot menus, Slack subcommand routing, and autocomplete — no other files need updating for the command listing.",
          code: `@dataclass(frozen=True)

          explanation: "This is the 'settings panel.' DEFAULT_CONFIG defines every possible setting with sensible defaults. When your config.yaml is missing keys, they auto-merge from defaults. If your config file gets corrupted, it backs it up automatically and warns you. Three different config loaders exist — CLI, gateway, and subcommands each load config slightly differently.",
          code: `DEFAULT_CONFIG = {
    "model": "",

        "max_turns": 90,

def load_config():
    \"\"\"Load config.yaml, cached on (mtime, size).\"\"\"
    ...`,
          connections: {imports: ["hermes_constants.py"], importedBy: ["cli.py", "gateway/run.py", "hermes_cli/plugins.py", "run_agent.py"]}

      ]
    },
    {

      color: "var(--node-gateway)",

      files: ["gateway/run.py", "gateway/platforms/base.py", "gateway/platforms/*"],
      connections: ["agent-core", "cli", "cron"],
      modules: [
        {
          id: "gateway-runner",
          name: "gateway/run.py",
          subtitle: "GatewayRunner class",
          desc: "The switchboard operator for multi-platform messaging. Starts all platform adapters, receives messages from users across platforms, routes them to AI agents, and sends responses back.",
          explanation: "When you run 'hermes gateway start', this is what runs. It boots up adapters for each configured platform (Telegram, Discord, etc.), maintains an agent cache (up to 128 sessions, 1-hour idle timeout), and routes incoming messages to the right agent session. It also sanitizes outbound messages — stripping leaked API keys, suppressing noisy status lines, and redacting provider errors.",
          code: `class GatewayRunner(GatewayAuthorizationMixin,
                    GatewayKanbanWatchersMixin,
                    GatewaySlashCommandsMixin):
    def __init__(self, config=None):
        self.config = config or load_gateway_config()
        self.adapters = {}    # Platform -> BasePlatformAdapter

// ============================================================
// APP STATE
// ============================================================

let currentLevel = 'top';
let currentSystem = null;
let currentModule = null;
let scale = 1;
let panX = 0, panY = 0;
let isDragging = false;
let dragStartX, dragStartY, startPanX, startPanY;

// ============================================================
// RENDERING
// ============================================================

function render() {
  const grid = document.getElementById('nodeGrid');
  grid.innerHTML = '';

  if (currentLevel === 'top') {
    renderTopLevel(grid);
  } else if (currentLevel === 'system') {
    renderSystemLevel(grid);
  } else if (currentLevel === 'module') {
    renderModuleLevel(grid);
  }

  updateBreadcrumb();
}

function renderTopLevel(grid) {
  // Design principles banner
  const banner = document.createElement('div');
  banner.style.cssText = 'width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:8px;';
  banner.innerHTML = `
    <h3 style="color:var(--accent);font-size:15px;margin-bottom:10px;">Two Sacred Design Properties</h3>
    <div style="display:flex;gap:20px;flex-wrap:wrap;">
      <div style="flex:1;min-width:250px;">
        <strong style="color:var(--accent5);font-size:13px;">1. Prompt caching is sacred</strong>
        <p style="color:var(--text-dim);font-size:13px;margin-top:4px;">Never mutate past context, swap toolsets, or rebuild system prompts mid-conversation. The only exception is context compression.</p>
      </div>
      <div style="flex:1;min-width:250px;">
        <strong style="color:var(--accent3);font-size:13px;">2. The core is a narrow waist</strong>
        <p style="color:var(--text-dim);font-size:13px;margin-top:4px;">Capability lives at the edges. New features arrive as skills, plugins, or MCP servers — not as core tools (which ship on every API call).</p>
      </div>
    </div>
  `;
  grid.appendChild(banner);

  DATA.systems.forEach(sys => {
    const card = createCard(sys.id, sys.icon, sys.name, sys.desc, sys.color, sys.files, () => {
      currentLevel = 'system';
      currentSystem = sys;
      currentModule = null;
      render();
    });
    grid.appendChild(card);
  });
}

function renderSystemLevel(grid) {
  const sys = currentSystem;

  const back = document.createElement('button');
  back.className = 'back-btn';
  back.innerHTML = '← Back to Overview';
  back.onclick = () => { currentLevel = 'top'; currentSystem = null; render(); };
  grid.appendChild(back);

  // System header
  const header = document.createElement('div');
  header.style.cssText = 'width:100%;margin-bottom:12px;';
  header.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
      <span style="font-size:32px;">${sys.icon}</span>
      <h2 style="font-size:22px;color:${sys.color};">${sys.name}</h2>
    </div>
    <p style="color:var(--text-dim);font-size:14px;line-height:1.6;max-width:800px;">${sys.desc}</p>
    <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;">
      ${sys.connections.map(c => {
        const target = DATA.systems.find(s => s.id === c);
        return `<span class="conn-badge"><span class="arrow">↔</span> ${target ? target.name : c}</span>`;
      }).join('')}
    </div>
  `;
  grid.appendChild(header);

  // Module cards
  sys.modules.forEach(mod => {
    const card = createCard(mod.id, null, mod.name, mod.desc, sys.color,
      mod.subtitle ? [mod.subtitle] : [], () => {
        currentModule = mod;
        openDetail(mod, sys.color);
      });
    grid.appendChild(card);
  });
}

function renderModuleLevel(grid) {
  // Same as system level but auto-opens detail
  renderSystemLevel(grid);
}

function createCard(id, icon, name, desc, color, tags, onClick) {
  const card = document.createElement('div');
  card.className = 'node-card';
  card.style.setProperty('--node-color', color);
  card.dataset.id = id;
  card.dataset.name = name.toLowerCase();

  card.innerHTML = `
    ${icon ? `<div class="node-icon">${icon}</div>` : ''}
    <h3>${name}</h3>
    <div class="node-desc">${desc.length > 180 ? desc.substring(0, 180) + '...' : desc}</div>
    <div class="node-files">
      ${tags.map(f => `<span class="file-tag">${f}</span>`).join('')}
    </div>
    <span class="click-hint">Click to explore →</span>
  `;

  card.onclick = onClick;
  return card;
}

  const title = document.getElementById('detailTitle');
  const body = document.getElementById('detailBody');

  title.textContent = mod.name;
  title.style.color = color;

  let html = '';

  // Plain English explanation
  if (mod.explanation) {
    html += `
      <div class="detail-section">
        <h4>In Plain English</h4>
        <div class="explanation">${mod.explanation}</div>
      </div>
    `;
  }

  // Technical description
  html += `
    <div class="detail-section">
      <h4>What It Does</h4>
      <p>${mod.desc}</p>
    </div>
  `;

  // Code snippet
  if (mod.code) {
    html += `
      <div class="detail-section">
        <h4>Code Snapshot</h4>
        <pre class="code-block">${highlightCode(mod.code)}</pre>
      </div>
    `;
  }

  // Connections
  if (mod.connections) {
    html += `<div class="detail-section"><h4>Connections</h4>`;
    if (mod.connections.imports && mod.connections.imports.length) {
      html += `<p style="margin-bottom:8px;"><strong style="color:var(--accent3);">Imports from:</strong></p>
        <div style="margin-bottom:12px;">${mod.connections.imports.map(i =>
          `<span class="conn-badge"><span class="arrow">←</span> ${i}</span>`
        ).join('')}</div>`;
    }
    if (mod.connections.importedBy && mod.connections.importedBy.length) {
      html += `<p style="margin-bottom:8px;"><strong style="color:var(--accent5);">Used by:</strong></p>
        <div>${mod.connections.importedBy.map(i =>
          `<span class="conn-badge"><span class="arrow">→</span> ${i}</span>`
        ).join('')}</div>`;
    }
    html += `</div>`;
  }

  // Sub-modules (function level)
  if (mod.submodules && mod.submodules.length) {
    html += `
      <div class="detail-section">
        <h4>Key Internal Modules</h4>
        <div class="sub-nodes">
          ${mod.submodules.map(sub => `
            <div class="sub-node">
              <h5>${sub.name}</h5>
              <p>${sub.desc}</p>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  body.innerHTML = html;
  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}

// ============================================================
// SYNTAX HIGHLIGHTING (simplified)
// ============================================================

function highlightCode(code) {
  return code
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/(#[^\n]*)/g, '<span class="cm">$1</span>')
    .replace(/\b(class|def|if|elif|else|for|while|return|import|from|with|as|in|is|not|and|or|try|except|raise|break|continue|pass|async|await|yield|lambda|None|True|False|self|const|let|function|export|abstract)\b/g, '<span class="kw">$1</span>')
    .replace(/\b(str|int|bool|dict|list|tuple|set|Path|Dict|List|Optional|ABC|frozenset)\b/g, '<span class="type">$1</span>')
    .replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, '<span class="str">$0</span>')
    .replace(/\b([a-zA-Z_]\w*)\s*(?=\()/g, '<span class="fn">$1</span>');
}

// ============================================================
// BREADCRUMB
// ============================================================

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = '<span onclick="goToLevel(\'top\')">Overview</span>';

  if (currentSystem) {
    html += '<span class="sep">/</span>';
    if (currentModule) {
      html += `<span onclick="goToLevel('system')">${currentSystem.name}</span>`;
      html += '<span class="sep">/</span>';
      html += `<span class="current">${currentModule.name}</span>`;
    } else {
      html += `<span class="current">${currentSystem.name}</span>`;
    }
  } else {
    html = '<span class="current" onclick="goToLevel(\'top\')">Overview</span>';
  }

  bc.innerHTML = html;
}

function goToLevel(level) {
  if (level === 'top') {
    currentLevel = 'top';
    currentSystem = null;
    currentModule = null;
    closeDetail();
  } else if (level === 'system') {
    currentLevel = 'system';
    currentModule = null;
    closeDetail();
  }
  render();
}

// ============================================================
// ZOOM & PAN
// ============================================================

function zoomIn() {
  scale = Math.min(scale * 1.2, 3);
  applyTransform();
}

function zoomOut() {
  scale = Math.max(scale / 1.2, 0.3);
  applyTransform();
}

function resetZoom() {
  scale = 1; panX = 0; panY = 0;
  applyTransform();
}

function applyTransform() {
  document.getElementById('canvasInner').style.transform =
    `translate(${panX}px, ${panY}px) scale(${scale})`;
}

// Mouse wheel zoom
document.getElementById('canvas').addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.3, Math.min(3, scale * delta));
  applyTransform();
}, {passive: false});

// Pan with mouse drag
const canvas = document.getElementById('canvas');
canvas.addEventListener('mousedown', (e) => {
  if (e.target === canvas || e.target.id === 'canvasInner' || e.target.id === 'nodeGrid') {
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    startPanX = panX;
    startPanY = panY;
    canvas.style.cursor = 'grabbing';
  }
});

document.addEventListener('mousemove', (e) => {
  if (isDragging) {
    panX = startPanX + (e.clientX - dragStartX);
    panY = startPanY + (e.clientY - dragStartY);
    applyTransform();
  }
});

document.addEventListener('mouseup', () => {
  isDragging = false;
  canvas.style.cursor = '';
});

// ============================================================
// SEARCH
// ============================================================

function filterNodes(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.node-card').forEach(card => {
    if (!q) {
      card.style.display = '';
      card.style.opacity = '1';
    } else {
      const matches = card.dataset.name.includes(q) ||
                     card.textContent.toLowerCase().includes(q);
      card.style.opacity = matches ? '1' : '0.2';
    }
  });
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;

  if (e.key === 'Escape') {
    if (document.getElementById('detailPanel').classList.contains('open')) {
      closeDetail();
    } else if (currentLevel !== 'top') {
      goToLevel(currentLevel === 'module' ? 'system' : 'top');
    }
  }
  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
  if (e.key === '0') resetZoom();
  if (e.key === '/' && !e.ctrlKey) {
    e.preventDefault();
    document.getElementById('searchBox').focus();
  }
});

// ============================================================
// INIT
// ============================================================

render();
</script>
</body>
</html>
